{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow-sm mt-5 border-0">
            <div class="card-body p-4">
                <h3 class="card-title text-center mb-4 fw-bold">會員登入</h3>
                <form action="{{ url_for('auth.login') }}" method="POST">
                    <div class="mb-3">
                        <label for="email" class="form-label">電子信箱</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">密碼</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 fw-bold">登入</button>
                    <div class="text-center mt-4">
                        <small class="text-muted">還沒有帳號嗎？ <a href="{{ url_for('auth.register_page') }}" class="text-decoration-none">前往註冊</a></small>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
